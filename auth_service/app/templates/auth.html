<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication — Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.7);
            --border-color: rgba(99, 102, 241, 0.2);
            --border-focus: rgba(99, 102, 241, 0.6);
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.35);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --error: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.1);
            --input-bg: rgba(15, 23, 42, 0.6);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Animated background ──────────────────────────────────── */
        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-gradient .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 12s ease-in-out infinite;
        }

        .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #6366f1, transparent 70%);
            top: -15%; left: -10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #8b5cf6, transparent 70%);
            bottom: -10%; right: -5%;
            animation-delay: -4s;
        }

        .orb-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, #06b6d4, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -8s;
            opacity: 0.2;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            33% { transform: translateY(-30px) scale(1.05); }
            66% { transform: translateY(20px) scale(0.95); }
        }

        /* ── Card container ──────────────────────────────────────── */
        .auth-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .auth-card {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px 36px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 20px 60px rgba(0,0,0,0.4),
                0 0 40px var(--accent-glow);
            transition: box-shadow 0.4s ease;
        }

        .auth-card:hover {
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.05),
                0 25px 70px rgba(0,0,0,0.5),
                0 0 60px var(--accent-glow);
        }

        /* ── Logo / Icon ─────────────────────────────────────────── */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
        }

        /* ── Heading ─────────────────────────────────────────────── */
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* ── Tab switcher ────────────────────────────────────────── */
        .tab-switcher {
            display: flex;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
            border: 1px solid rgba(99, 102, 241, 0.1);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            background: transparent;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
        }

        .tab-btn:not(.active):hover {
            color: var(--text-secondary);
        }

        /* ── Form fields ─────────────────────────────────────────── */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
            pointer-events: none;
            transition: color 0.3s ease;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.925rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-input:focus ~ .icon,
        .form-input:focus + .icon {
            color: var(--accent);
        }

        /* ── Password toggle ─────────────────────────────────────── */
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: var(--text-secondary);
        }

        /* ── Submit button ───────────────────────────────────────── */
        .submit-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #6366f1, #7c3aed);
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.35);
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .submit-btn .spinner {
            display: none;
            width: 20px; height: 20px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        .submit-btn.loading .btn-text { display: none; }
        .submit-btn.loading .spinner { display: block; }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 500;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider span {
            padding: 0 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Alerts ──────────────────────────────────────────────── */
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        .alert.show {
            display: flex;
        }

        .alert-success {
            background: var(--success-bg);
            border: 1px solid rgba(16, 185, 129, 0.25);
            color: var(--success);
        }

        .alert-error {
            background: var(--error-bg);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: var(--error);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Protected content (post-login) ──────────────────────── */
        .protected-panel {
            display: none;
            text-align: center;
        }

        .protected-panel.show {
            display: block;
        }

        .user-avatar {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            margin: 0 auto 20px;
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.3);
        }

        .user-info h2 {
            font-size: 1.3rem;
            margin-bottom: 4px;
        }

        .user-info p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .token-box {
            margin-top: 24px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 14px;
            text-align: left;
        }

        .token-box label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        .token-box code {
            display: block;
            font-size: 0.7rem;
            color: var(--accent-hover);
            word-break: break-all;
            line-height: 1.6;
            max-height: 80px;
            overflow-y: auto;
        }

        .logout-btn {
            margin-top: 24px;
            padding: 11px 28px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            color: var(--error);
            font-size: 0.875rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        /* ── Password strength indicator ─────────────────────────── */
        .password-strength {
            height: 3px;
            border-radius: 3px;
            margin-top: 8px;
            background: rgba(255,255,255,0.05);
            overflow: hidden;
            transition: opacity 0.3s;
        }

        .password-strength .bar {
            height: 100%;
            width: 0;
            border-radius: 3px;
            transition: width 0.4s ease, background 0.4s ease;
        }

        /* ── Responsive ──────────────────────────────────────────── */
        @media (max-width: 480px) {
            .auth-card { padding: 28px 20px; }
            .auth-header h1 { font-size: 1.35rem; }
        }
    </style>
</head>
<body>

    <!-- Animated background -->
    <div class="bg-gradient">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">

            <!-- Logo -->
            <div class="logo">
                <div class="logo-icon">🔐</div>
            </div>

            <!-- Header -->
            <div class="auth-header">
                <h1 id="form-title">Welcome Back</h1>
                <p id="form-subtitle">Sign in to access your account</p>
            </div>

            <!-- Tab switcher -->
            <div class="tab-switcher">
                <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Create Account</button>
                <button class="tab-btn" id="tab-phone" onclick="switchTab('phone')">Phone OTP</button>
            </div>

            <!-- Alert -->
            <div class="alert" id="alert">
                <span id="alert-icon"></span>
                <span id="alert-message"></span>
            </div>

            <!-- ── Login Form ──────────────────────────────────── -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" class="form-input" id="login-email"
                               placeholder="you@example.com" required autocomplete="email">
                        <span class="icon">✉</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" id="login-password"
                               placeholder="••••••••" required autocomplete="current-password">
                        <span class="icon">🔒</span>
                        <button type="button" class="toggle-password" onclick="togglePw('login-password', this)">👁</button>
                    </div>
                </div>
                <button type="submit" class="submit-btn" id="login-btn">
                    <span class="btn-text">Sign In</span>
                    <span class="spinner"></span>
                </button>

                <div class="divider"><span>OR</span></div>
                
                <!-- Google Login Button -->
                <div id="g_id_onload"
                     data-client_id="458874729818-0ci90s9s6u8dtl70rkea9iuohd3r77sn.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleGoogleLogin"
                     data-auto_prompt="false">
                </div>
                <div class="google-btn-wrapper" style="display: flex; justify-content: center; width: 100%; overflow: hidden; border-radius: 10px;">
                    <div class="g_id_signin"
                         data-type="standard"
                         data-shape="rectangular"
                         data-theme="filled_black"
                         data-text="signin_with"
                         data-size="large"
                         data-logo_alignment="left">
                    </div>
                </div>
            </form>

            <!-- ── Register Form ───────────────────────────────── -->
            <form id="register-form" style="display:none" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <div class="input-wrapper">
                        <input type="text" class="form-input" id="reg-name"
                               placeholder="Alice Smith" required minlength="2" autocomplete="name">
                        <span class="icon">👤</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" class="form-input" id="reg-email"
                               placeholder="you@example.com" required autocomplete="email">
                        <span class="icon">✉</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" id="reg-password"
                               placeholder="Min 8 chars, 1 uppercase, 1 digit" required minlength="8"
                               autocomplete="new-password" oninput="checkStrength(this.value)">
                        <span class="icon">🔒</span>
                        <button type="button" class="toggle-password" onclick="togglePw('reg-password', this)">👁</button>
                    </div>
                    <div class="password-strength"><div class="bar" id="pw-bar"></div></div>
                </div>
                <button type="submit" class="submit-btn" id="register-btn">
                    <span class="btn-text">Create Account</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <!-- ── Phone Form ───────────────────────────────────── -->
            <form id="phone-form" style="display:none" onsubmit="handlePhoneVerify(event)">
                <div id="phone-input-group">
                    <div class="form-group">
                        <label for="phone-number">Phone Number</label>
                        <div class="input-wrapper">
                            <input type="tel" class="form-input" id="phone-number"
                                   placeholder="+919876543210" required autocomplete="tel">
                            <span class="icon">📱</span>
                        </div>
                    </div>
                    <button type="button" class="submit-btn" id="send-otp-btn" onclick="handleSendOTP()">
                        <span class="btn-text">Send OTP</span>
                        <span class="spinner"></span>
                    </button>
                </div>

                <div id="otp-input-group" style="display:none; margin-top: 20px;">
                    <div class="form-group">
                        <label for="otp-code">Verification Code</label>
                        <div class="input-wrapper">
                            <input type="text" class="form-input" id="otp-code"
                                   placeholder="123456" maxlength="6" autocomplete="one-time-code">
                            <span class="icon">🛡️</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="phone-name">Full Name (Optional)</label>
                        <div class="input-wrapper">
                            <input type="text" class="form-input" id="phone-name"
                                   placeholder="Alice Smith">
                            <span class="icon">👤</span>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn" id="verify-otp-btn">
                        <span class="btn-text">Verify & Login</span>
                        <span class="spinner"></span>
                    </button>
                    <button type="button" class="logout-btn" style="width:100%; margin-top:10px; border-color:var(--text-muted); color:var(--text-muted); background:none;" onclick="resetPhoneForm()">Back</button>
                </div>
            </form>

            <!-- ── Protected Panel (shown after login) ─────────── -->
            <div class="protected-panel" id="protected-panel">
                <div class="user-avatar" id="user-avatar">A</div>
                <div class="user-info">
                    <h2 id="user-name">Alice Smith</h2>
                    <p id="user-email">alice@example.com</p>
                </div>
                <div class="token-box">
                    <label>JWT Access Token</label>
                    <code id="user-token">—</code>
                </div>
                <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
            </div>

        </div>
    </div>

    <script>
        // ── Config ────────────────────────────────────────────────
        const API = '';  // same origin
        // Where to redirect after successful login
        // (the main AI Research Assistant app served by backend/app.py)
        const MAIN_APP_URL = '/dashboard';

        // ── On page load: if user already has a valid token, redirect ─
        (function checkExistingSession() {
            const token = localStorage.getItem('access_token');
            if (token) {
                // Verify token is still valid before auto-redirecting
                fetch(`${API}/api/protected`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(res => {
                    if (res.ok) {
                        window.location.href = MAIN_APP_URL;
                    } else {
                        // Token expired or invalid — clear it
                        localStorage.removeItem('access_token');
                    }
                }).catch(() => {
                    // Server not reachable — stay on login
                });
            }
        })();

        // ── Tab switching ─────────────────────────────────────────
        function switchTab(tab) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const phoneForm = document.getElementById('phone-form');
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');
            const tabPhone = document.getElementById('tab-phone');
            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');

            hideAlert();

            // Reset visibility
            loginForm.style.display = 'none';
            registerForm.style.display = 'none';
            phoneForm.style.display = 'none';
            tabLogin.classList.remove('active');
            tabRegister.classList.remove('active');
            tabPhone.classList.remove('active');

            if (tab === 'login') {
                loginForm.style.display = 'block';
                tabLogin.classList.add('active');
                title.textContent = 'Welcome Back';
                subtitle.textContent = 'Sign in to access your account';
            } else if (tab === 'register') {
                registerForm.style.display = 'block';
                tabRegister.classList.add('active');
                title.textContent = 'Create Account';
                subtitle.textContent = 'Join us — it only takes a moment';
            } else if (tab === 'phone') {
                phoneForm.style.display = 'block';
                tabPhone.classList.add('active');
                title.textContent = 'Phone Login';
                subtitle.textContent = 'Sign in via secure OTP code';
                resetPhoneForm();
            }
        }

        // ── Google Login ──────────────────────────────────────────
        async function handleGoogleLogin(response) {
            hideAlert();
            setLoading('login-btn', true); // Show loading on the main login button for feedback

            try {
                const res = await fetch(`${API}/api/auth/google`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential }),
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    processLoginSuccess(data.data);
                } else {
                    showAlert('error', data.error || 'Google login failed.');
                }
            } catch (err) {
                showAlert('error', 'Network error during Google login.');
            } finally {
                setLoading('login-btn', false);
            }
        }

        // ── Phone OTP ─────────────────────────────────────────────
        let currentPhone = '';

        async function handleSendOTP() {
            const phoneInput = document.getElementById('phone-number');
            const phone = phoneInput.value.trim();
            if (!phone) return showAlert('error', 'Please enter a phone number.');

            hideAlert();
            setLoading('send-otp-btn', true);

            try {
                const res = await fetch(`${API}/api/auth/phone/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone }),
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    currentPhone = data.data.phone;
                    document.getElementById('phone-input-group').style.display = 'none';
                    document.getElementById('otp-input-group').style.display = 'block';
                    
                    let msg = 'OTP sent!';
                    if (data.data.otp_dev_only) {
                        msg += ` (Dev: ${data.data.otp_dev_only})`;
                    }
                    showAlert('success', msg);
                } else {
                    showAlert('error', data.error || 'Failed to send OTP.');
                }
            } catch (err) {
                showAlert('error', 'Network error sending OTP.');
            } finally {
                setLoading('send-otp-btn', false);
            }
        }

        async function handlePhoneVerify(e) {
            e.preventDefault();
            const otp = document.getElementById('otp-code').value.trim();
            const name = document.getElementById('phone-name').value.trim();
            if (!otp) return showAlert('error', 'Please enter the OTP.');

            hideAlert();
            setLoading('verify-otp-btn', true);

            try {
                const res = await fetch(`${API}/api/auth/phone/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: currentPhone, otp, name }),
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    processLoginSuccess(data.data);
                } else {
                    showAlert('error', data.error || 'Invalid OTP.');
                }
            } catch (err) {
                showAlert('error', 'Network error during verification.');
            } finally {
                setLoading('verify-otp-btn', false);
            }
        }

        function resetPhoneForm() {
            document.getElementById('phone-input-group').style.display = 'block';
            document.getElementById('otp-input-group').style.display = 'none';
            document.getElementById('otp-code').value = '';
            document.getElementById('phone-name').value = '';
        }

        function processLoginSuccess(authData) {
            const token = authData.access_token;
            const user = authData.user;

            localStorage.setItem('access_token', token);
            localStorage.setItem('user_name', user.name);
            localStorage.setItem('user_email', user.email || '');

            showAlert('success', 'Login successful! Redirecting…');
            setTimeout(() => { window.location.href = MAIN_APP_URL; }, 1000);
        }

        // ── Alert helpers ─────────────────────────────────────────
        function showAlert(type, message) {
            const alert = document.getElementById('alert');
            const icon = document.getElementById('alert-icon');
            const msg = document.getElementById('alert-message');
            alert.className = `alert alert-${type} show`;
            icon.textContent = type === 'success' ? '✓' : '✕';
            msg.textContent = message;
        }

        function hideAlert() {
            document.getElementById('alert').className = 'alert';
        }

        // ── Password toggle ───────────────────────────────────────
        function togglePw(id, btn) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🔒';
            } else {
                input.type = 'password';
                btn.textContent = '👁';
            }
        }

        // ── Password strength ─────────────────────────────────────
        function checkStrength(pw) {
            const bar = document.getElementById('pw-bar');
            let score = 0;
            if (pw.length >= 8) score++;
            if (/[A-Z]/.test(pw)) score++;
            if (/\d/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;

            const widths = ['0%', '25%', '50%', '75%', '100%'];
            const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#10b981'];
            bar.style.width = widths[score];
            bar.style.background = colors[score];
        }

        // ── Loading state helpers ─────────────────────────────────
        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // ── Register ──────────────────────────────────────────────
        async function handleRegister(e) {
            e.preventDefault();
            hideAlert();
            setLoading('register-btn', true);

            const body = {
                name: document.getElementById('reg-name').value.trim(),
                email: document.getElementById('reg-email').value.trim(),
                password: document.getElementById('reg-password').value,
            };

            try {
                const res = await fetch(`${API}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    showAlert('success', 'Account created! Switching to login…');
                    setTimeout(() => switchTab('login'), 1500);
                } else {
                    showAlert('error', data.error || 'Registration failed.');
                }
            } catch (err) {
                showAlert('error', 'Network error — is the server running?');
            } finally {
                setLoading('register-btn', false);
            }
        }

        // ── Login ─────────────────────────────────────────────────
        async function handleLogin(e) {
            e.preventDefault();
            hideAlert();
            setLoading('login-btn', true);

            const body = {
                email: document.getElementById('login-email').value.trim(),
                password: document.getElementById('login-password').value,
            };

            try {
                const res = await fetch(`${API}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    const token = data.data.access_token;
                    const user = data.data.user;

                    // Store token and user info in localStorage
                    localStorage.setItem('access_token', token);
                    localStorage.setItem('user_name', user.name);
                    localStorage.setItem('user_email', user.email);

                    showAlert('success', 'Login successful! Redirecting…');

                    // ✅ Redirect to main app page after a brief delay
                    setTimeout(() => {
                        window.location.href = MAIN_APP_URL;
                    }, 1000);
                } else {
                    // ❌ Failed — stay on the login page, show error
                    showAlert('error', data.error || 'Invalid credentials.');
                }
            } catch (err) {
                // ❌ Network error — stay on the login page
                showAlert('error', 'Network error — is the server running?');
            } finally {
                setLoading('login-btn', false);
            }
        }

        // ── Logout (called from main page via ?logout=true) ───────
        function handleLogout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user_name');
            localStorage.removeItem('user_email');
            showAlert('success', 'Logged out successfully.');
        }
    </script>
</body>
</html>
